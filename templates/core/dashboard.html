{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
    <div class="eyebrow">Panel principal</div>
    <h1>Dashboard</h1>

    <p class="lead">Bienvenido, <strong>{{ request.user.username }}</strong>.</p>

    <div class="status-card">
        <span class="status-dot" aria-hidden="true"></span>
        <span>Autenticación activa y sesión protegida.</span>
    </div>

    <form method="post" action="{% url 'logout' %}" class="stack">
        {% csrf_token %}
        <button type="submit">Cerrar sesión</button>
    </form>
{% endblock %}
